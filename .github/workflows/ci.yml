name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install ruff==0.6.9
      - run: ruff check --output-format=github

  test:
    name: Pytest + coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - name: Install test deps
        run: |
          pip install pytest==8.3.3 pytest-cov==5.0.0 pytest-mock==3.14.0 opencv-python==4.10.0.84 onnxruntime==1.17.1 "numpy<2"
      - name: Run pytest with coverage gate (>=90%)
        run: |
          pytest tests/ \
          --ignore tests/integration \
          --cov=src \
          --cov-report term-missing \
          --cov-report=xml \
          --cov-report=html \
          --cov-fail-under=90 \
          -v

  security-scan:
    name: Bandit + pip-audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install bandit==1.7.10 pip-audit==2.7.3
      - name: Bandit (Python SAST)
        run: bandit -r src/ -ll
      - name: pip-audit (CVE scan on deps)
        run: pip-audit --strict -r requirements.txt

  build:
    name: Build & push ARM64 image
    runs-on: [self-hosted, linux, arm64, jetson]
    needs: [test, security-scan]
    steps:
      - uses: actions/checkout@v5
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
          
      - name: Process Environment Variables
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT
          echo "repo_lowercase=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          
      - name: Create Cache Directories
        run: mkdir -p /home/jetson/.buildx-cache /home/jetson/.buildx-cache-new 
           
      # PHASE 1: BUILD AND LOAD ONLY (NO PUSH)
      - name: Build and Load into Jetson
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: false   # CRITICAL: We do not push here anymore
          load: true    # CRITICAL: We load it directly into the Jetson's local memory
          tags: ghcr.io/${{ steps.vars.outputs.repo_lowercase }}:sha-${{ steps.vars.outputs.sha_short }}
          cache-from: type=local,src=/home/jetson/.buildx-cache
          cache-to: type=local,dest=/home/jetson/.buildx-cache-new,mode=max

      # PHASE 2: SAVE CACHE IMMEDIATELY
      # If the network fails later, your 4-hour build is already saved!
      - name: Swap local cache (Prevents Disk Full Error)
        run: |
          rm -rf /home/jetson/.buildx-cache
          mv /home/jetson/.buildx-cache-new /home/jetson/.buildx-cache

      # PHASE 3: BRUTE FORCE PUSH
      # This script will violently retry pushing up to 10 times, bypassing Docker's weak limits.
      - name: Brute-Force Push to GHCR
        run: |
          IMAGE="ghcr.io/${{ steps.vars.outputs.repo_lowercase }}:sha-${{ steps.vars.outputs.sha_short }}"
          echo "Attempting to push $IMAGE..."
          for i in {1..10}; do
            echo "Push attempt $i of 10..."
            docker push $IMAGE && echo "Push successful!" && break
            echo "Network dropped. Waiting 15 seconds before retrying..."
            sleep 15
            if [ $i -eq 10 ]; then
              echo "Failed to push after 10 attempts."
              exit 1
            fi
          done

  integration-test:
    name: Integration test (Jetson)
    runs-on: [self-hosted, linux, arm64, jetson]
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - name: Login to GHCR on Jetson
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Install pytest deps
        run: pip install --user pytest==8.3.3
      - name: Run E2E integration test
        run: |
          SHA=$(git rev-parse --short=7 HEAD)
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMG="ghcr.io/$REPO:sha-$SHA"
          IMAGE="$IMG" pytest tests/integration/test_jetson_e2e.py -v