name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write   # Required to push Docker images to GitHub Container Registry

jobs:
  # ---------------------------------------------------------
  # STAGE 1: LINTING (Formatting & Syntax)
  # ---------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.10"
      - name: Install Quality Tools
        run: pdm install -G quality
      - name: Run Ruff
        run: pdm run lint

  # ---------------------------------------------------------
  # STAGE 2: UNIT TESTING (With 90% Coverage Gate)
  # ---------------------------------------------------------
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.10"
      - name: Install Test Tools
        run: pdm install -G test
      - name: Run Pytest
        run: pdm run test-cov

  # ---------------------------------------------------------
  # STAGE 3: SECURITY SCANNING
  # ---------------------------------------------------------
  security-scan:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.10"
      - name: Install Quality Tools
        run: pdm install -G quality
      - name: Run Bandit
        run: pdm run security

  # ---------------------------------------------------------
  # STAGE 4: CLOUD BUILD (Docker)
  # ---------------------------------------------------------
  build:
    needs: [test, security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up QEMU (For ARM64 Building)
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}/dms-core:latest

  # ---------------------------------------------------------
  # STAGE 5: HARDWARE INTEGRATION TEST
  # ---------------------------------------------------------
  integration-test:
    needs: build
    # THIS is where we call the Jetson runner you set up earlier!
    runs-on: [self-hosted, linux, arm64, jetson, orin-nano]
    steps:
      - name: Pull Latest Built Image
        run: docker pull ghcr.io/${{ github.repository }}/dms-core:latest
      
      # For now, we just verify the container can start on the physical hardware without crashing
      - name: Hardware Smoke Test
        run: |
          docker run --rm --runtime=nvidia ghcr.io/${{ github.repository }}/dms-core:latest python3 -c "import torch; print('CUDA Available:', torch.cuda.is_available())"
