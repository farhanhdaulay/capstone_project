name: Deploy

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy (Jetson)
    runs-on: [self-hosted, linux, arm64, jetson]
    environment:
      name: production
      url: >-
        https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v5
      
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4
        
      - name: Re-tag the SHA image as semver
        env:
          TAG: ${{ github.ref_name }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          SRC="ghcr.io/${{ github.repository }}:sha-$SHORT_SHA"
          MAJ="${TAG%%.*}"
          MIN="${TAG%.*}"
          for NEW in "$TAG" "$MIN" "$MAJ" "latest"; do
            IMG_BASE="ghcr.io/${{ github.repository }}"
            docker buildx imagetools create -t "$IMG_BASE:$NEW" "$SRC"
          done
          
      - name: Run deploy.sh on this Jetson
        env:
          DEPLOY_ENV: production
        run: |
          chmod +x deploy/deploy.sh deploy/healthcheck.sh
          bash deploy/deploy.sh "${{ github.ref_name }}"
